<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de carros</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>titulo foda</h1>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
 </header>
 <div class="form-container"> 
    <div class="form-header">
        <p>Formulário</p>
     </div>
     </div>
     <div class="form-body">
<h1 class="titulo-form">Venda Fácil Seu Carro</h1>
<p>Descreva as características do seu veículo e marque as opcionais que ele possui.</p>
        <form>
            <div class="caixaInputs">
                <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                <input type="text" name="title" id="title" class="block" placeholder="Digite um título para o anúncio">
            </div>
            <div class="caixaInputs">
                <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                <input type="number" name="preco" id="preco" class="block" placeholder="Digite o preço">
            </div>
        </form>
     </div>
    </div>
</body>
</html>
