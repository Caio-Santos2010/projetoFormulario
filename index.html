<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de carros</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>titulo Venda seu Carro</h1>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
            <div class="form-body">
                <h1 class="titulo-form">Venda Fácil Seu Carro</h1>
                <p>Descreva as características do seu veículo e marque as opcionais que ele possui.</p>
                <form>
                    <div class="caixaInputs">
                        <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title" class="block"
                            placeholder="Digite um título para o anúncio">
                    </div>
                    <div class="caixaInputs">
                        <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco" class="block" placeholder="Digite o preço">
                    </div>
                    <div class="caixaInputs">
                        <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label>
                        <textarea name="descricao" id="descricao" class="block"
                            placeholder="Digite a descrição de seu veículo"></textarea>
                    </div>
                    <div class="caixaInputs">
                        <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca">
                    </div>
                    <div class="caixaInputs">
                        <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o modelo">
                    </div>
                    <div class="caixaInputs">
                        <label for="kilometragem">kilometragem <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block"
                            placeholder="Digite a kilometragem">
                    </div>
                    <div class="caixaInputs">
                        <label for="data-compra">Data de compra <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="data-compra" id="data-compra" class="block">
                    </div>
                    <div class="caixaInputs">
                        <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                        <input type="radio" name="marcha" id="manual">
                        <label for="manual">Manual</label>
                        <input type="radio" name="marcha" id="auto">
                        <label for="auto">Automático</label>
                    </div>
                    <div class="caixaOpcional">
                        <p>opcionais</p>
                        <ul class="listaOpcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                                <label for="airbag">Airbag</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                                <label for="alarme">Alarme</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="ar-condicionado" value="ar-condicionado">
                                <label for="Ar Condicionado">Ar Condicionado</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="camera-de-re" value="camera-de-re">
                                <label for="Câmera de Ré">Câmera de Ré</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaOpcional">
                        <ul class="listaOpcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="assistente-de-pista"
                                    value="assistente-de-pista">
                                <label for="Assistente de Pista">Assistente de Pista</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="partida-sem-chave"
                                    value="partida-sem-chave">
                                <label for="Partida sem Chave">Partida sem Chave</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="integracao-com-celular"
                                    value="integracao-com-celular">
                                <label for="Integração com Celular">Integração com Celular</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="banco-de-couro" value="banco-de-couro">
                                <label for="Banco de Couro">Banco de Couro</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaInputs">
                        <p>Fotos do Carro <span class="campo-obrigatorio">*</span></p>
                        <input type="file" name="images" id="images" multiple accept="image/png, image/jpg">
                    </div>
                    <input type="submit" value="Enviar" class="btn-submit">
                </form>
            </div>
        </div>
</body>

</html>
